<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Card Placement Analysis{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🎴 Card Placement Analysis</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}" {% if request.endpoint=='index' %}class="active" {% endif
                        %}>Home</a></li>
                <li><a href="{{ url_for('explorer') }}" {% if request.endpoint=='explorer' %}class="active" {% endif
                        %}>Explorer</a></li>
                <li><a href="{{ url_for('patterns') }}" {% if request.endpoint=='patterns' %}class="active" {% endif
                        %}>Patterns</a></li>
                <li><a href="{{ url_for('blank_patterns_page') }}">Blank Patterns</a></li>
                <li><a href="{{ url_for('powerbi') }}">Power BI</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>Card Placement Analysis Web Application | Flask Backend</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animation_player.js') }}"></script>
    {% block extra_js %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>

</html>
